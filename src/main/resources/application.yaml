logging:
  level:
    com.generic4.itda: debug
    org.springframework.web.servlet: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace

spring:
  h2.console.enabled: true

  config:
    import: optional:file:.env.properties

  datasource:
    driver-class-name: ${DRIVER_CLASS_NAME}
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_batch_fetch_size: 100
        format_sql: true
    show-sql: true

file:
  upload:
    base-path: ${FILE_UPLOAD_PATH}
    profile-image-dir: profile
    proposal-dir: proposal
    resume-dir: resume

ai:
  brief:
    enabled: ${AI_BRIEF_ENABLED:false}
    api-url: ${AI_BRIEF_API_URL:https://api.openai.com/v1/responses}
    api-key: ${AI_BRIEF_API_KEY:}
    model: ${AI_BRIEF_MODEL:gpt-5-mini}
    max-output-tokens: ${AI_BRIEF_MAX_OUTPUT_TOKENS:2000}
