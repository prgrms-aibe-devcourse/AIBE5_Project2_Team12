<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<body>
<div layout:fragment="content">
    <main class="min-h-screen flex flex-col items-center justify-center p-8 bg-white" x-data="{ hoverRole: null }">
        <div class="max-w-4xl w-full text-center space-y-12">

            <div class="space-y-4" x-show="loaded" x-transition.enter>
                <div class="inline-flex items-center gap-2 px-4 py-2 bg-blue-50 text-blue-600 rounded-full text-xs font-bold tracking-widest uppercase border border-blue-100">
                    <i data-lucide="zap" class="w-3 h-3 fill-current"></i> AI-Powered Matching
                </div>
                <h1 class="text-5xl lg:text-6xl font-black tracking-tighter text-slate-900">
                    IT 프로젝트의 시작,<br/><span class="text-blue-600">IT-da</span>로 잇다
                </h1>
                <p class="text-lg text-slate-500 font-medium max-w-xl mx-auto">
                    AI가 분석하는 구조화된 제안서와 정교한 매칭 알고리즘으로 최적의 파트너를 만나보세요.
                </p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8" x-show="loaded" x-transition.enter style="transition-delay: 100ms;">

                <div class="relative">
                    <th:block sec:authorize="isAnonymous()">
                        <a th:href="@{/login(role='client')}"
                           @mouseenter="hoverRole = 'client'" @mouseleave="hoverRole = null"
                           class="group relative block p-10 bg-slate-50 border-2 border-transparent rounded-[40px] transition-all hover:border-blue-600 hover:bg-white hover:shadow-2xl hover:shadow-blue-100 text-left overflow-hidden">
                            <div th:replace="~{::clientCardContent}"></div>
                        </a>
                    </th:block>
                    <th:block sec:authorize="isAuthenticated()">
                        <a th:href="@{/client/dashboard}"
                           @mouseenter="hoverRole = 'client'" @mouseleave="hoverRole = null"
                           class="group relative block p-10 bg-slate-50 border-2 border-transparent rounded-[40px] transition-all hover:border-blue-600 hover:bg-white hover:shadow-2xl hover:shadow-blue-100 text-left overflow-hidden">
                            <div th:replace="~{::clientCardContent}"></div>
                        </a>
                    </th:block>
                </div>

                <div class="relative">
                    <th:block sec:authorize="isAnonymous()">
                        <a th:href="@{/login(role='freelancer')}"
                           @mouseenter="hoverRole = 'freelancer'" @mouseleave="hoverRole = null"
                           class="group relative block p-10 bg-slate-50 border-2 border-transparent rounded-[40px] transition-all hover:border-blue-600 hover:bg-white hover:shadow-2xl hover:shadow-blue-100 text-left overflow-hidden">
                            <div th:replace="~{::freelancerCardContent}"></div>
                        </a>
                    </th:block>
                    <th:block sec:authorize="isAuthenticated()">
                        <a th:href="@{/freelancer/projects}"
                           @mouseenter="hoverRole = 'freelancer'" @mouseleave="hoverRole = null"
                           class="group relative block p-10 bg-slate-50 border-2 border-transparent rounded-[40px] transition-all hover:border-blue-600 hover:bg-white hover:shadow-2xl hover:shadow-blue-100 text-left overflow-hidden">
                            <div th:replace="~{::freelancerCardContent}"></div>
                        </a>
                    </th:block>
                </div>

            </div>
        </div>
    </main>

    <th:block th:remove="all">
        <div th:fragment="clientCardContent" class="relative z-10">
            <div class="w-16 h-16 bg-white rounded-3xl flex items-center justify-center text-slate-400 group-hover:text-blue-600 group-hover:scale-110 transition-all shadow-sm mb-8">
                <i data-lucide="briefcase" class="w-8 h-8"></i>
            </div>
            <h3 class="text-2xl font-bold mb-2">클라이언트</h3>
            <p class="text-slate-500 text-sm leading-relaxed">프로젝트를 등록하고<br/>최적의 프리랜서를 추천받으세요.</p>
        </div>

        <div th:fragment="freelancerCardContent" class="relative z-10">
            <div class="w-16 h-16 bg-white rounded-3xl flex items-center justify-center text-slate-400 group-hover:text-blue-600 group-hover:scale-110 transition-all shadow-sm mb-8">
                <i data-lucide="user" class="w-8 h-8"></i>
            </div>
            <h3 class="text-2xl font-bold mb-2">프리랜서</h3>
            <p class="text-slate-500 text-sm leading-relaxed">나의 역량을 등록하고<br/>맞춤형 프로젝트 제안을 받으세요.</p>
        </div>
    </th:block>
</div>
</body>
</html>
