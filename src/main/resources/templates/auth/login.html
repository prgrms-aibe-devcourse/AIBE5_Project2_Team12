<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
  <title>로그인 | IT-da</title>
</head>
<body>
<div layout:fragment="content">
  <div class="min-h-screen bg-slate-50 font-sans text-slate-900 flex flex-col relative">

    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center p-8">
      <div class="w-full max-w-[480px]">
        <!-- Login Card -->
        <div class="bg-white border border-slate-200 rounded-[32px] shadow-2xl shadow-slate-200/50 overflow-hidden"
             x-show="loaded" x-transition.enter>
          <div class="p-10">
            <!-- Title Section -->
            <div class="mb-10 text-center">
              <div class="inline-flex items-center gap-2 px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-[10px] font-bold tracking-widest uppercase mb-4 border border-blue-100">
                <i data-lucide="shield-check" class="w-3 h-3 fill-current"></i> Secure Login
              </div>
              <h2 class="text-2xl font-bold mb-2 text-slate-900">다시 오신 것을 환영합니다!</h2>
              <p class="text-sm text-slate-500">등록된 계정으로 로그인하여 서비스를 이용하세요.</p>
            </div>

            <!-- Login Error Message -->
            <div th:if="${loginError}" class="p-4 bg-red-50 border border-red-100 rounded-2xl mb-6 flex items-center gap-3">
              <i data-lucide="alert-circle" class="w-4 h-4 text-red-500"></i>
              <p class="text-xs text-red-600 font-bold">이메일 혹은 비밀번호를 확인해주세요.</p>
            </div>

            <!-- Login Form -->
            <form class="space-y-6" th:action="@{/login}" method="post">
              <!-- CSRF Token -->
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

              <!-- Email Field -->
              <div class="space-y-2">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider ml-1">이메일 주소</label>
                <div class="relative">
                  <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                  <input type="email" name="email" required
                         placeholder="example@it-da.com"
                         class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm focus:outline-none focus:border-blue-600 focus:ring-4 focus:ring-blue-600/5 transition-all">
                </div>
              </div>

              <!-- Password Field -->
              <div class="space-y-2">
                <div class="flex items-center justify-between ml-1">
                  <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">비밀번호</label>
                  <a href="#" class="text-[10px] font-bold text-blue-600 hover:underline">비밀번호 찾기</a>
                </div>
                <div class="relative">
                  <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                  <input type="password" name="password" required
                         placeholder="••••••••"
                         class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm focus:outline-none focus:border-blue-600 focus:ring-4 focus:ring-blue-600/5 transition-all">
                </div>
              </div>

              <!-- Submit Button -->
              <div class="pt-2">
                <button type="submit"
                        class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold text-sm hover:bg-blue-700 shadow-xl shadow-blue-200 transition-all active:scale-[0.98] flex items-center justify-center gap-2 group">
                  로그인하기
                  <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                </button>
              </div>
            </form>

            <!-- Signup Link -->
            <div class="mt-10 pt-8 border-t border-slate-100 text-center">
              <p class="text-xs text-slate-400 font-medium">
                아직 계정이 없으신가요?
                <a th:href="@{/signup}" class="ml-2 text-blue-600 font-bold hover:underline">지금 바로 가입하기</a>
              </p>
            </div>
          </div>
        </div>

        <!-- Footer Info -->
        <footer class="mt-8 text-center">
          <p class="text-[10px] text-slate-400 font-medium">© 2024 IT-da. All rights reserved.</p>
        </footer>
      </div>
    </main>
  </div>
</div>
</body>
</html>
