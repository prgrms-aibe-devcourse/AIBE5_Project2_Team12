<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --line: #d6dee8;
      --text: #111827;
      --muted: #6b7280;
      --accent: #0f766e;
      --danger-bg: #fee2e2;
      --danger-text: #991b1b;
      --success-bg: #dcfce7;
      --success-text: #166534;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
    }

    .card {
      width: min(100%, 420px);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .message {
      margin-bottom: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
    }

    .message.error {
      background: var(--danger-bg);
      color: var(--danger-text);
    }

    .message.success {
      background: var(--success-bg);
      color: var(--success-text);
    }

    form {
      display: grid;
      gap: 14px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 15px;
    }

    button {
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .signup-cta {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }

    .signup-cta a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
<section class="card">
  <h1>로그인</h1>
  <p>가입한 이메일과 비밀번호로 로그인합니다.</p>

  <div class="message success" th:if="${signupSuccess}">회원가입이 완료되었습니다. 로그인해 주세요.</div>
  <div class="message error" th:if="${loginError}">이메일 또는 비밀번호를 확인해 주세요.</div>

  <form th:action="@{/login}" method="post">
    <input type="email" name="email" placeholder="name@example.com" autocomplete="email">
    <input type="password" name="password" placeholder="비밀번호" autocomplete="current-password">
    <button type="submit">로그인</button>
  </form>

  <div class="signup-cta">
    아직 계정이 없나요? <a th:href="@{/signup}">회원가입 하기</a>
  </div>
</section>
</body>
</html>
