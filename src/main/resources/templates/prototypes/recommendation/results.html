<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>추천 결과 목록</title>
</head>
<body>
<div layout:fragment="content">
    <main class="min-h-screen bg-slate-50 px-6 py-10 lg:px-10"
          x-data="recommendationResultsPrototype()"
          x-effect="$nextTick(() => window.lucide && lucide.createIcons())">
        <div class="mx-auto flex w-full max-w-7xl flex-col gap-6">
            <div th:replace="~{fragments/recommendation-prototype :: flowNav(${activePrototypePage})}"></div>
            <div th:replace="~{fragments/recommendation-prototype :: screenGuide}"></div>

            <section class="rounded-[32px] border border-slate-200 bg-white p-6 shadow-sm shadow-slate-200/70">
                <div class="grid gap-6 xl:grid-cols-[1.1fr_0.9fr]">
                    <div class="space-y-4">
                        <div class="flex flex-wrap items-center gap-3">
                            <span class="rounded-full border border-emerald-200 bg-emerald-50 px-3 py-1 text-xs font-bold text-emerald-700"
                                  x-text="run.statusLabel"></span>
                            <span class="rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-xs font-bold text-slate-500"
                                  x-text="run.algorithm"></span>
                            <span class="rounded-full border border-blue-100 bg-blue-50 px-3 py-1 text-xs font-bold text-blue-600">
                                fingerprint <span class="ml-1" x-text="run.requestFingerprint"></span>
                            </span>
                        </div>

                        <div>
                            <p class="text-xs font-black uppercase tracking-widest text-slate-400">프로젝트 / 포지션</p>
                            <h2 class="mt-2 text-3xl font-black tracking-tight text-slate-950" x-text="proposal.proposalTitle"></h2>
                            <p class="mt-2 text-sm leading-6 text-slate-500">
                                <span x-text="proposal.proposalStatusLabel"></span>
                                <span class="mx-2 text-slate-300">•</span>
                                선택 포지션 <span class="font-semibold text-slate-700" x-text="selectedPositionLabel()"></span>
                                <span class="mx-2 text-slate-300">•</span>
                                계산 완료 <span class="font-semibold text-slate-700" x-text="run.completedAt"></span>
                            </p>
                        </div>

                        <div class="grid gap-3 md:grid-cols-3">
                            <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                                <p class="text-xs font-black uppercase tracking-wider text-slate-400">최종 후보 수</p>
                                <p class="mt-2 text-2xl font-black text-slate-950" x-text="run.candidateCount + '명'"></p>
                            </div>
                            <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                                <p class="text-xs font-black uppercase tracking-wider text-slate-400">추천 대상 topK</p>
                                <p class="mt-2 text-2xl font-black text-slate-950" x-text="run.topK + '명'"></p>
                            </div>
                            <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                                <p class="text-xs font-black uppercase tracking-wider text-slate-400">직접 지원자</p>
                                <p class="mt-2 text-2xl font-black text-slate-950" x-text="applicants.length + '명'"></p>
                            </div>
                        </div>
                    </div>

                    <div class="grid gap-3 md:grid-cols-2">
                        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                            <p class="text-xs font-black uppercase tracking-wider text-slate-400">추천 필터 파이프라인</p>
                            <div class="mt-4 space-y-3 text-sm">
                                <div class="flex items-center justify-between">
                                    <span class="text-slate-500">전체 후보</span>
                                    <span class="font-black text-slate-900" x-text="run.hardFilterStats.totalCandidates"></span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-slate-500">ACTIVE 통과</span>
                                    <span class="font-black text-slate-900" x-text="run.hardFilterStats.afterActiveFilter"></span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-slate-500">공개 여부 통과</span>
                                    <span class="font-black text-slate-900" x-text="run.hardFilterStats.afterVisibilityFilter"></span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-slate-500">AI 허용 통과</span>
                                    <span class="font-black text-emerald-700" x-text="run.hardFilterStats.afterAiEnabledFilter"></span>
                                </div>
                            </div>
                        </div>
                        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                            <p class="text-xs font-black uppercase tracking-wider text-slate-400">보조 액션</p>
                            <div class="mt-4 flex flex-col gap-3">
                                <a href="/prototypes/recommendations"
                                   class="inline-flex items-center justify-between rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-700 transition hover:border-slate-300">
                                    제안서 수정 mock
                                    <i data-lucide="file-pen-line" class="h-4 w-4 text-slate-400"></i>
                                </a>
                                <a href="/prototypes/recommendations/error"
                                   class="inline-flex items-center justify-between rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-700 transition hover:border-slate-300">
                                    실패 상태 보기
                                    <i data-lucide="triangle-alert" class="h-4 w-4 text-slate-400"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-6 grid gap-3 lg:grid-cols-[1fr_auto_auto_auto]">
                    <label class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
                        <span class="text-xs font-black uppercase tracking-wider text-slate-400">포지션 선택</span>
                        <select x-model="selectedPosition"
                                class="mt-2 w-full bg-transparent text-sm font-semibold text-slate-900 outline-none">
                            <template x-for="option in positions" :key="option.value">
                                <option :value="option.value" x-text="option.label"></option>
                            </template>
                        </select>
                    </label>

                    <label class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
                        <span class="text-xs font-black uppercase tracking-wider text-slate-400">후보 상태</span>
                        <select x-model="candidateFilter"
                                class="mt-2 w-full bg-transparent text-sm font-semibold text-slate-900 outline-none">
                            <option value="all">전체 프리랜서</option>
                            <option value="available">즉시 투입 가능</option>
                            <option value="busy">참여 중</option>
                        </select>
                    </label>

                    <label class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
                        <span class="text-xs font-black uppercase tracking-wider text-slate-400">정렬</span>
                        <select x-model="sortKey"
                                class="mt-2 w-full bg-transparent text-sm font-semibold text-slate-900 outline-none">
                            <template x-for="option in sortOptions" :key="option.value">
                                <option :value="option.value" x-text="option.label"></option>
                            </template>
                        </select>
                    </label>

                    <div class="flex items-end">
                        <button type="button"
                                @click="compareTray = []"
                                class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-700 transition hover:border-slate-300">
                            비교 초기화
                        </button>
                    </div>
                </div>
            </section>

            <section class="grid gap-6 xl:grid-cols-[1.1fr_0.9fr]">
                <div class="space-y-5">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-xs font-black uppercase tracking-widest text-slate-400">AI 추천 Top 후보</p>
                            <h3 class="mt-2 text-2xl font-black tracking-tight text-slate-950">설명 가능한 추천 카드 리스트</h3>
                        </div>
                        <span class="rounded-full border border-slate-200 bg-white px-3 py-1 text-xs font-bold text-slate-500"
                              x-text="filteredRecommendations.length + '명 표시'"></span>
                    </div>

                    <template x-for="candidate in filteredRecommendations" :key="candidate.id">
                        <article class="rounded-[30px] border border-slate-200 bg-white p-6 shadow-sm shadow-slate-200/70">
                            <div class="flex flex-col gap-5">
                                <div class="flex flex-wrap items-start justify-between gap-4">
                                    <div class="space-y-3">
                                        <div class="flex flex-wrap items-center gap-2">
                                            <span class="rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-xs font-bold text-slate-600" x-text="'TOP ' + candidate.rank"></span>
                                            <span class="rounded-full border px-3 py-1 text-xs font-bold"
                                                  :class="availabilityBadgeClass(candidate.availabilityKey)"
                                                  x-text="candidate.availabilityLabel"></span>
                                            <span class="rounded-full border px-3 py-1 text-xs font-bold"
                                                  :class="llmBadgeClass(candidate.llmStatus)"
                                                  x-text="candidate.llmStatusLabel"></span>
                                        </div>
                                        <div>
                                            <h4 class="text-2xl font-black tracking-tight text-slate-950" x-text="candidate.nickname"></h4>
                                            <p class="mt-2 text-sm text-slate-500" x-text="candidate.headline"></p>
                                        </div>
                                    </div>

                                    <div class="grid min-w-[220px] gap-3 sm:grid-cols-2">
                                        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4 text-center">
                                            <p class="text-xs font-black uppercase tracking-wider text-slate-400">추천 점수</p>
                                            <p class="mt-2 text-3xl font-black text-slate-950" x-text="candidate.finalScore + '%'"></p>
                                        </div>
                                        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4 text-center">
                                            <p class="text-xs font-black uppercase tracking-wider text-slate-400">임베딩</p>
                                            <p class="mt-2 text-3xl font-black text-slate-950" x-text="candidate.embeddingScore + '%'"></p>
                                        </div>
                                    </div>
                                </div>

                                <div class="grid gap-4 lg:grid-cols-[1fr_0.9fr]">
                                    <div class="space-y-4 rounded-[24px] border border-slate-200 bg-slate-50 p-5">
                                        <div>
                                            <div class="flex items-center justify-between text-xs font-black uppercase tracking-wider text-slate-400">
                                                <span>스킬 일치도</span>
                                                <span x-text="candidate.matchRate + '%'"></span>
                                            </div>
                                            <div class="mt-3 h-2 rounded-full bg-slate-200">
                                                <div class="h-2 rounded-full bg-blue-600" :style="`width:${candidate.matchRate}%`"></div>
                                            </div>
                                        </div>

                                        <div>
                                            <p class="text-xs font-black uppercase tracking-wider text-slate-400">핵심 스킬</p>
                                            <div class="mt-3 flex flex-wrap gap-2">
                                                <template x-for="skill in candidate.matchedSkills" :key="skill">
                                                    <span class="rounded-full border border-slate-200 bg-white px-3 py-1 text-xs font-semibold text-slate-600" x-text="skill"></span>
                                                </template>
                                            </div>
                                        </div>

                                        <div>
                                            <p class="text-xs font-black uppercase tracking-wider text-slate-400">AI 코멘트</p>
                                            <p class="mt-3 text-sm leading-7 text-slate-600" x-text="candidate.aiComment"></p>
                                        </div>
                                    </div>

                                    <div class="space-y-4 rounded-[24px] border border-slate-200 bg-white p-5">
                                        <div class="flex items-center justify-between text-sm">
                                            <span class="font-semibold text-slate-500">경력</span>
                                            <span class="font-black text-slate-950" x-text="candidate.careerYears + '년'"></span>
                                        </div>
                                        <div class="flex items-center justify-between text-sm">
                                            <span class="font-semibold text-slate-500">선호 근무</span>
                                            <span class="font-black text-slate-950" x-text="candidate.preferredWorkTypeLabel"></span>
                                        </div>
                                        <div class="flex items-center justify-between text-sm">
                                            <span class="font-semibold text-slate-500">현재 참여 상태</span>
                                            <span class="font-black text-slate-950" x-text="candidate.activeProjects"></span>
                                        </div>
                                        <div>
                                            <p class="text-xs font-black uppercase tracking-wider text-slate-400">면접 질문 미리보기</p>
                                            <ul class="mt-3 space-y-2 text-sm leading-6 text-slate-600">
                                                <template x-for="question in candidate.interviewQuestions.slice(0, 2)" :key="question">
                                                    <li class="flex gap-2">
                                                        <span class="mt-2 h-1.5 w-1.5 rounded-full bg-slate-400"></span>
                                                        <span x-text="question"></span>
                                                    </li>
                                                </template>
                                            </ul>
                                        </div>
                                    </div>
                                </div>

                                <div class="flex flex-wrap gap-3">
                                    <a :href="candidate.detailHref"
                                       class="inline-flex items-center gap-2 rounded-2xl bg-slate-950 px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">
                                        <i data-lucide="panel-right-open" class="h-4 w-4"></i>
                                        상세 보기
                                    </a>
                                    <button type="button"
                                            @click="toggleCompare(candidate)"
                                            class="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-700 transition hover:border-slate-300">
                                        <i data-lucide="columns-3" class="h-4 w-4"></i>
                                        비교에 추가
                                    </button>
                                    <a href="#"
                                       class="inline-flex items-center gap-2 rounded-2xl border border-blue-100 bg-blue-50 px-4 py-3 text-sm font-semibold text-blue-700 transition hover:border-blue-200">
                                        <i data-lucide="send" class="h-4 w-4"></i>
                                        매칭 요청
                                    </a>
                                </div>
                            </div>
                        </article>
                    </template>
                </div>

                <aside class="space-y-5">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-xs font-black uppercase tracking-widest text-slate-400">직접 지원자</p>
                            <h3 class="mt-2 text-2xl font-black tracking-tight text-slate-950">지원자 카드 리스트</h3>
                        </div>
                        <span class="rounded-full border border-slate-200 bg-white px-3 py-1 text-xs font-bold text-slate-500"
                              x-text="filteredApplicants.length + '명 표시'"></span>
                    </div>

                    <template x-for="applicant in filteredApplicants" :key="applicant.id">
                        <article class="rounded-[28px] border border-slate-200 bg-white p-5 shadow-sm shadow-slate-200/70">
                            <div class="flex items-start justify-between gap-4">
                                <div>
                                    <div class="flex flex-wrap items-center gap-2">
                                        <span class="rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-xs font-bold text-slate-500">Direct Apply</span>
                                        <span class="rounded-full border px-3 py-1 text-xs font-bold"
                                              :class="reviewBadgeClass(applicant.reviewTone)"
                                              x-text="applicant.reviewStatus"></span>
                                    </div>
                                    <h4 class="mt-3 text-xl font-black tracking-tight text-slate-950" x-text="applicant.nickname"></h4>
                                    <p class="mt-2 text-sm text-slate-500" x-text="'지원 일시 ' + applicant.appliedAt"></p>
                                </div>
                                <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-center">
                                    <p class="text-xs font-black uppercase tracking-wider text-slate-400">경력</p>
                                    <p class="mt-1 text-xl font-black text-slate-950" x-text="applicant.careerYears + '년'"></p>
                                </div>
                            </div>

                            <div class="mt-4 flex flex-wrap gap-2">
                                <template x-for="skill in applicant.skills" :key="skill">
                                    <span class="rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-xs font-semibold text-slate-600" x-text="skill"></span>
                                </template>
                            </div>

                            <div class="mt-4 flex items-center justify-between text-sm">
                                <span class="text-slate-500">선호 근무 형태</span>
                                <span class="font-semibold text-slate-800" x-text="applicant.preferredWorkTypeLabel"></span>
                            </div>

                            <div class="mt-5 flex flex-wrap gap-3">
                                <a href="/prototypes/recommendations/results/101"
                                   class="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-700 transition hover:border-slate-300">
                                    <i data-lucide="panel-right-open" class="h-4 w-4"></i>
                                    상세 보기
                                </a>
                                <button type="button"
                                        @click="toggleCompare(normalizedApplicant(applicant))"
                                        class="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold text-slate-700 transition hover:border-slate-300 hover:bg-white">
                                    <i data-lucide="columns-3" class="h-4 w-4"></i>
                                    비교하기
                                </button>
                            </div>
                        </article>
                    </template>
                </aside>
            </section>

            <section x-show="compareTray.length > 0" x-cloak class="sticky bottom-6 z-20">
                <div class="rounded-[30px] border border-slate-950 bg-slate-950/95 p-5 text-white shadow-[0_20px_60px_-20px_rgba(15,23,42,0.8)] backdrop-blur">
                    <div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
                        <div>
                            <p class="text-xs font-black uppercase tracking-widest text-slate-400">비교 트레이</p>
                            <h3 class="mt-2 text-2xl font-black tracking-tight">후보를 나란히 비교해 매칭 여부를 빠르게 결정합니다.</h3>
                        </div>
                        <div class="flex gap-3">
                            <button type="button"
                                    @click="compareTray = []"
                                    class="rounded-2xl border border-white/10 px-4 py-3 text-sm font-semibold text-slate-300 transition hover:border-white/20 hover:text-white">
                                비우기
                            </button>
                            <a href="/prototypes/recommendations/results/101"
                               class="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-950 transition hover:bg-slate-100">
                                상세 비교 이어서 보기
                            </a>
                        </div>
                    </div>

                    <div class="mt-5 grid gap-4 lg:grid-cols-3">
                        <template x-for="candidate in compareTray" :key="candidate.id">
                            <article class="rounded-[24px] border border-white/10 bg-white/5 p-4">
                                <div class="flex items-start justify-between gap-3">
                                    <div>
                                        <div class="flex items-center gap-2">
                                            <span class="rounded-full border border-white/10 bg-white/10 px-3 py-1 text-[11px] font-black uppercase tracking-wider"
                                                  x-text="candidate.type === 'applicant' ? 'Applicant' : 'AI Pick'"></span>
                                        </div>
                                        <h4 class="mt-3 text-xl font-black" x-text="candidate.nickname"></h4>
                                        <p class="mt-1 text-sm text-slate-400" x-text="candidate.headline || candidate.reviewStatus"></p>
                                    </div>
                                    <button type="button"
                                            @click="toggleCompare(candidate)"
                                            class="inline-flex h-10 w-10 items-center justify-center rounded-2xl border border-white/10 text-slate-300 transition hover:text-white">
                                        <i data-lucide="x" class="h-4 w-4"></i>
                                    </button>
                                </div>

                                <div class="mt-4 grid gap-3 text-sm">
                                    <div class="flex items-center justify-between">
                                        <span class="text-slate-400">경력</span>
                                        <span class="font-bold text-white" x-text="candidate.careerYears + '년'"></span>
                                    </div>
                                    <div class="flex items-center justify-between">
                                        <span class="text-slate-400">선호 근무형태</span>
                                        <span class="font-bold text-white" x-text="candidate.preferredWorkTypeLabel"></span>
                                    </div>
                                    <div class="flex items-center justify-between">
                                        <span class="text-slate-400">참여 상태</span>
                                        <span class="font-bold text-white" x-text="candidate.activeProjects || candidate.reviewStatus"></span>
                                    </div>
                                    <div class="flex items-center justify-between" x-show="candidate.finalScore !== null">
                                        <span class="text-slate-400">추천 점수</span>
                                        <span class="font-bold text-white" x-text="candidate.finalScore + '%'"></span>
                                    </div>
                                </div>

                                <div class="mt-4 flex flex-wrap gap-2">
                                    <template x-for="skill in candidate.matchedSkills || candidate.skills" :key="skill">
                                        <span class="rounded-full border border-white/10 bg-white/10 px-3 py-1 text-xs font-semibold text-slate-100" x-text="skill"></span>
                                    </template>
                                </div>

                                <p class="mt-4 text-sm leading-6 text-slate-300" x-text="candidate.llmReason || candidate.aiComment || '직접 지원자이므로 AI 설명은 없습니다.'"></p>
                            </article>
                        </template>
                    </div>
                </div>
            </section>

            <div th:replace="~{fragments/recommendation-prototype :: mockPayloadPanel}"></div>
        </div>
    </main>

    <script th:inline="javascript">
        function recommendationResultsPrototype() {
            const payload = {
                run: /*[[${recommendationRun}]]*/ {},
                proposal: /*[[${proposalSummary}]]*/ {},
                positions: /*[[${positionOptions}]]*/ [],
                sortOptions: /*[[${sortOptions}]]*/ [],
                recommended: /*[[${recommendationResults}]]*/ [],
                applicants: /*[[${applicants}]]*/ [],
                comparisonSeed: /*[[${comparisonSeed}]]*/ []
            };

            return {
                ...payload,
                selectedPosition: payload.positions[0]?.value || 'backend',
                candidateFilter: 'all',
                sortKey: 'score',
                compareTray: payload.comparisonSeed || [],
                selectedPositionLabel() {
                    return this.positions.find(option => option.value === this.selectedPosition)?.label || '';
                },
                get filteredRecommendations() {
                    const filtered = this.recommended.filter(candidate => {
                        if (this.candidateFilter === 'all') {
                            return true;
                        }
                        return candidate.availabilityKey === this.candidateFilter;
                    });
                    return filtered.sort((left, right) => {
                        if (this.sortKey === 'career') {
                            return right.careerYears - left.careerYears;
                        }
                        if (this.sortKey === 'recent') {
                            return left.rank - right.rank;
                        }
                        return right.finalScore - left.finalScore;
                    });
                },
                get filteredApplicants() {
                    return this.applicants.filter(applicant => {
                        if (this.candidateFilter === 'all') {
                            return true;
                        }
                        return this.candidateFilter === 'available'
                                ? applicant.reviewStatus !== '보류'
                                : applicant.reviewStatus === '보류';
                    });
                },
                toggleCompare(candidate) {
                    const exists = this.compareTray.some(item => item.id === candidate.id);
                    if (exists) {
                        this.compareTray = this.compareTray.filter(item => item.id !== candidate.id);
                        return;
                    }
                    if (this.compareTray.length >= 3) {
                        this.compareTray = [...this.compareTray.slice(1), candidate];
                        return;
                    }
                    this.compareTray = [...this.compareTray, candidate];
                },
                normalizedApplicant(applicant) {
                    return {
                        ...applicant,
                        type: 'applicant',
                        headline: '직접 지원 후보',
                        finalScore: null,
                        llmReason: null,
                        aiComment: '직접 지원자이므로 AI 추천 설명 없이 기본 프로필 위주로 비교합니다.',
                        activeProjects: applicant.reviewStatus,
                        matchedSkills: applicant.skills
                    };
                },
                availabilityBadgeClass(key) {
                    if (key === 'available') {
                        return 'border-emerald-200 bg-emerald-50 text-emerald-700';
                    }
                    if (key === 'busy') {
                        return 'border-amber-200 bg-amber-50 text-amber-700';
                    }
                    return 'border-slate-200 bg-slate-50 text-slate-600';
                },
                llmBadgeClass(status) {
                    if (status === 'READY') {
                        return 'border-cyan-200 bg-cyan-50 text-cyan-700';
                    }
                    if (status === 'FAILED') {
                        return 'border-rose-200 bg-rose-50 text-rose-700';
                    }
                    return 'border-slate-200 bg-slate-50 text-slate-600';
                },
                reviewBadgeClass(tone) {
                    if (tone === 'blue') {
                        return 'border-cyan-200 bg-cyan-50 text-cyan-700';
                    }
                    if (tone === 'amber') {
                        return 'border-amber-200 bg-amber-50 text-amber-700';
                    }
                    return 'border-slate-200 bg-slate-50 text-slate-600';
                }
            };
        }
    </script>
</div>
